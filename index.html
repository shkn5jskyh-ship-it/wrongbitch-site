<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WrongBitch.co</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial,Helvetica,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle,#7a0000 0%,transparent 60%);
opacity:.25;
animation:pulse 6s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.card{
position:relative;
text-align:center;
z-index:1;
padding:40px;
}

h1{
font-size:60px;
color:#ff0000;
text-shadow:0 0 10px red,0 0 30px red;
margin-bottom:15px;
}

p{
font-size:22px;
color:#ddd;
margin-bottom:30px;
}

button{
background:#a00000;
color:white;
border:none;
padding:15px 40px;
border-radius:50px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:red;
transform:scale(1.08);
box-shadow:0 0 20px red;
}

</style>

</head>

<body>

<div class="card">

<h1>WrongBitch.co</h1>

<p>Wrong person. Wrong assumptions. Wrong energy.</p>

<button onclick="alert('Access Granted ❤️')">
ENTER
</button>

</div>

</body>

</html>
