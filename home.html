<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | WrongBitch.co</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(255,0,0,.15) 0%, transparent 70%);
    animation:pulse 6s ease-in-out infinite;
    z-index:-1;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:.2;
    }
    50%{
        transform:scale(1.4);
        opacity:.4;
    }
    100%{
        transform:scale(1);
        opacity:.2;
    }
}
}

header{
    text-align:center;
    padding:40px;
    color:red;
    font-size:40px;
    font-weight:box
}

section{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h2{
    color:red;
}

li{
    margin:12px 0;
    font-size:20px;
}

#assumeBtn{
    background:#8b0000;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    display:block;
    margin:40px auto 20px;
    transition:.3s;
}

#assumeBtn:hover{
    background:red;
    box-shadow:0 0 20px red;
}

#result{
    text-align:center;
    font-size:22px;
    color:#ff4d4d;
    min-height:30px;
}
</style>

</head>

<body>

<header>
WrongBitch.co
</header>

<section>

<h2>🚫 I DON'T...</h2>

<ul>
<li>Chase people.</li>
<li>Beg.</li>
<li>Fake friendships.</li>
<li>Lower my standards.</li>
<li>Entertain disrespect.</li>
</ul>

<button id="assumeBtn">ASSUME AGAIN</button>

<p id="result"></p>

</section>

<script>
const messages = [
  "❌ Still wrong.",
  "🚫 Try another theory.",
  "💀 Access denied.",
  "📵 Wrong person.",
  "⚠️ Error 404: Correct assumption not found.",
  "🔒 Better luck next time."
];

document.getElementById("assumeBtn").onclick = function () {
  const random = Math.floor(Math.random() * messages.length);
  document.getElementById("result").innerHTML = messages[random];
};
</script>

</body>
</html>
